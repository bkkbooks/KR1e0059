body:
  text: 春秋諸國統紀卷三元齊履謙撰周王第二周姬姓其先后稷封邰夏后之衰不窋奔戎太王去邠居岐文王始興武王克殷而有天下都于鎬京自武王十二世至平王宜臼東遷洛邑是謂東周平王四十九年春秋之始平王桓王莊王僖王惠王襄王頃王匡王定王簡王靈王景王敬王隱元十九平四秋七月天王使宰咺來歸惠公仲子之賵王朝大夫有爵者則書爵無爵者但書名惟冢宰則書官書名冢宰而兼三公者則書宰書公而復不書名有爵則書爵所以視列侯惟冢宰則書官所以重首相歸下曰賵賵者冒也歸上曰賻賻者傅也冬十有二月祭伯來祭國伯爵也直來曰來外諸侯相朝猶為失禮以王臣而下來廷見於魯其非可知故春秋不言其朝以正私交之罪雖書王臣事然自魯與接是亦内辭也隱三十一平五三月庚戌天王崩春秋歴十有三王志崩者九平桓惠襄匡定簡靈景不志者四莊僖頃其一敬王在春秋後然春秋列書天王崩諸侯卒者凡二十國其世次則一從本史間有闕而不書者皆本史遣脱官失其守聖人不妄増也一以存當時文獻之實一以示後世傳疑之誼夏四月辛卯君氏卒君氏當依公穀作尹氏葢尹氏武氏仍叔榮叔家父曰氏曰叔曰父皆世稱也如晉稱趙孟之類世世稱之故詩有仍叔春秋亦有仍叔詩有家父春秋亦有家父詩有尹氏春秋終始凡兩書尹氏又案春秋卒尹氏以見諸卿之世卒王子虎以見公族之世葬劉卷以見王臣稱公之僭桓五三桓十秋蔡人衞人陳人從王伐鄭此年蔡人衞人陳人從王伐鄭莊六年王人子突救衞成元年王師敗績于茅戎一則傷威毁重親屈伐鄭之師一則兵寡力弱不成救衞之功一則背盟棄信卒致徐吾之敗文屬事比則周之綱維日就委靡有不待辨而明者餘事亦多類此宜細推之桓六四桓十春正月寔來言寔來者承上文也州公一出而私交二國往外曰遂内來曰寔皆兼事之辭也桓九七桓十春紀季姜歸于京師逆后二祭公來遂逆王后于紀襄十五年劉夏逆王后于齊一書歸一不書歸書歸者逆而得者也不書歸者逆而不得者也祭公將逆后于紀不能以王命自將其書曰祭公來遂逆王后于紀則託魯之意可見矣桓十五三桓二十三月乙未天王崩莊三莊六五月葬桓王天王之葬魯會者二文九年叔孫得臣如京師葬襄王昭二十二年叔鞅如京師葬景王不㑹者三此年葬桓王宣三年葬匡王襄二年葬簡王而亦書者葢有他國會之禮天子之葬動天下屬諸侯故苟有會之者則書其不書者皆諸侯之不會者也莊六莊九春王正月王人子突救衞王朝大夫書爵則無爵書子則無采故須冠王人於上而繫子突於下僖八十五惠二春王正月公會王人齊侯宋公衞侯許男曹伯陳世子款盟于洮王人會盟其有采邑者因采為氏而稱子其無采邑者則但稱王人而不名葢王人則可以序諸侯之上而名氏則不可以登列會之先冬十有二月天王崩文五十襄三王使召伯來會葬春秋之時王室衰微紀綱法度日以壞亂雖時以禮接諸侯有出於王命者有不出於王命者有雖出王命而實非王意者出於王命者書王又書天者是也不出王命者天王俱不書者是也雖出王命而實非王意者書王不書天者是也葢春秋之誼雖為之曲全典敎又必欲不没其實故其書法如此昭七年衞襄公卒衞齊惡告喪于周且請王命王使成簡公如衞追命襄公云云所謂雖出王命而實非王意者魯桓似之王即周也周者天下之號王者京師之稱故春秋書周正曰王正周兵曰王師周卿士曰王人文八十三襄三秋八月天王崩文十頃二及蘇子盟于女栗王人以采配子即以為爵者其文常施於會盟何為常施於會盟所以視列侯齊邦君也蘇子之於女栗劉子之於平丘尹子單子之於伐鄭納王皆是也不然一劉文公也何以會於召陵則書子卒但稱名宣二匡六冬十月乙亥天王崩宣十五定十三夏六月王札子殺召伯毛伯王季子王札子皆頃王子定王兄弟不曰王子某者所以别諸王子公羊氏曰王札子者長庶之稱成五十一定二冬十有一月己酉天王崩成八簡三秋七月天子使召伯來賜公命自諸侯言之則曰天王自諸臣言之則曰天子誼得曰錫私恩曰賜左氏傳僖九年王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子以伯舅耋老加勞賜一級無下拜其禮文有類此者襄元四簡十九月辛酉天王崩襄二十八靈二十七十有二月甲寅天王崩昭二十二景二十五夏四月乙丑天王崩宋國第三宋子姓國紂庶兄微子啓始封十四世至穆公和入春秋穆公殤公莊公閔公桓公襄公成公昭公文公共公平公元公景公隱三穆九八月庚辰宋公和卒桓二殤九春王正月宋督弑其君與夷及其大夫孔父莊二八莊十乙酉宋公馮卒莊十二閔十秋八月甲午宋萬弑其君捷及其大夫仇牧僖九十一桓三春王三月丁丑宋公御說卒僖二十一襄十二十有二月公會諸侯盟于薄釋宋公盂薄皆宋地凡諸侯見執境外曰歸境内曰釋其曰釋宋公者葢執而未出境也僖二十三襄十四夏五月庚寅宋公兹父卒文七七成十夏四月宋公王臣卒宋人殺其大夫文八昭元宋人殺其大夫司馬宋司城來奔春秋稱人以殺大夫者凡六莊二十二年陳人殺其公子禦冦文七年宋人殺其大夫八年宋人殺其大夫司馬九年晉人殺其大夫先都晉人殺其大夫士縠及箕鄭父昭八年陳人殺其大夫公子過殺禦冦傳但言陳人殺其太子禦冦更不明稱人之㫖殺先都士縠箕鄭父傳言夷之蒐晉侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勲不可廢也從之先克奪蒯得田于堇隂故箕鄭父先都士縠梁益耳蒯得作亂九年正月己酉使賊殺先克乙丑晉人殺先都梁益耳三月甲戌晉人殺箕鄭父士縠蒯得殺公子過傳言哀公有廢疾三月甲申公子招公子過殺悼太子偃師而立公子留夏四月辛亥哀公縊陳公子招歸罪於公子過而殺之宋人殺其大夫傳言宋成公卒昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣必不可君其圖之不聽穆襄之族率國人以攻公殺公孫固公孫鄭于公宫以上凡四殺大夫皆國亂無政衆人擅殺之公羊氏曰大夫相殺稱人謂此類也但先都士縠箕鄭父公子過書名氏者為殺有罪公孫固公孫鄭不書名氏者為殺無罪此其不同耳然未有以官書者此則曰司馬司空云者又以見其執國之重為君之股肱屏翰而意不在於殺大夫也故二卿書官於前華孫不稱使於後繼書曰宋人弑其君杵臼則夫人之惡著矣或曰大夫不名非世卿也書官世不以罪也是皆夫人専國之效昭公見弑之漸文十五昭八三月宋司馬華孫來盟春秋外臣來盟不稱使者有三髙子來盟魯無君也屈完來盟楚未服也華孫來盟夫人命也穀梁氏曰無君之辭也葢得其旨其書官者又以見其為夫人之黨殺公子卭而代之位者文十六昭九冬十有一月宋人弑其君杵臼成二十二六二八月壬午宋公鮑卒成十五共十三夏六月宋公固卒襄三十三平三十三月甲午宋災宋伯姬卒宋平以千乗之君而不能救其母於火共姬之於婦道雖盡而宋平之於子職則虧故書公孫夀季孫行父二上卿納幣致女不謂不貴晉齊衞三國之人來媵不謂不尊葬則冠以夫諡不謂不正皆所以重録伯姬之變深著宋平之罪昭十十四平四十有二月甲子宋公成卒昭二十二元十二十有一月己亥宋公佐卒于曲棘齊國第四齊姜姓國師尚父太公望始封十三世至僖公祿父入春秋僖公襄公桓公孝公昭公懿公惠公頃公靈公莊公景公悼公隱七五僖十齊侯使其弟年來聘凡稱弟者皆本史辭案春秋諸國世卿公族居多君之弟稱弟君之子稱公子公子之子稱公孫而弟又有稱叔季者許叔蔡季是也是皆本史之異辭也春秋從而弗革以見為國不擇賢之弊公族亂政之由桓三十二僖二夏齊侯衞侯胥命于蒲要言而不㰱血曰胥命或曰盟之有胥命猶會之有遇皆位均勢敵莫適為主之辭也伯者作則不得為爾矣故曰春秋美胥命以是為近古桓十四三僖三十冬十有二月丁巳齊侯禄父卒莊四襄七六月乙丑齊侯葬紀伯姬上書楚師滅陳下書葬陳哀公上書紀侯去國下書齊侯葬紀伯姬皆國滅而為敵所葬彼不言楚人葬陳哀公者承上文可知又案春秋内女之書葬者三紀伯姬則齊侯葬之紀叔姬則紀季葬之宋共姬則魯人葬之是皆吾女之遭人倫之變者故書其本末之詳如此莊八二襄十冬十有一月癸未齊無知弑其君諸兒莊九桓元齊小白入于齊凡公子取國或書歸或書入書歸者有奉之者也書入者無奉之者也有奉之者鄭突曹赤是已無奉之者齊小白許叔是巳九月齊人取子糾殺之納稱糾殺稱子糾以稱王猛卒稱王子猛同一書法曰糾曰王猛者筆削之微旨所以惡争奪曰子糾曰王子猛者記事之常辭所以道名分又案春秋凡兩争國者名則俱名爵則俱爵故歸稱突出稱鄭伯奔稱忽復稱世子閔元十五桓二冬齊仲孫來仲孫湫其不稱使者以省難來非聘事閔二十六桓二冬齊髙子來盟髙傒其不稱使者魯時無君僖元十七桓二齊師宋師曹師城邢時未有伐邢者然則三國之師次於聶北案兵觀釁以待事遷國就安以圖存春秋之紀桓師未有善於此者故城楚丘不言救城縁陵不言救而城邢獨言救其書法可見秋七月戊辰夫人姜氏薨于夷齊人以歸自入春秋衞完魯息姑魯允宋與夷陳免鄭忽子儀齊諸兒宋捷不數十年而弑者九起天王不加誅方伯不致討人道亡天理滅矣自桓公奮起雖以哀姜之親猶誅死不赦四十年間而天下諸侯無敢有動於惡者葢桓公之功於是為大而聖人稱之以為民到今受其賜殆亦有取於此云以其尸歸使絶之魯僖四十桓三春王正月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘楚屈完來盟于師盟于召陵屈完不稱使楚未服也屈完來盟文與國佐如師一也或稱使或不稱使其稱使者服之也其不稱使者未服之也楚方結盟而退明年滅弦又明年圍許滅黄伐徐敗徐于婁林諸侯莫能救以此知楚為未服也故穀梁氏曰于師前定也于召陵得志乎桓公也得志者不得志也以桓公得志為僅矣是亦言楚人之未服也僖十七三桓四十冬十有二月乙亥齊侯小白卒僖十八孝元狄救齊案左氏傳稱宋襄以諸侯伐齊殺無虧立孝公而還然考之於經左氏之言有不可信者無虧者長衞姬子即衞出也而衞人與伐左氏之言其不可信一也狄之救齊是不與孝公也而越明年孝公及狄盟左氏之言其不可信二也徳莫重於納已孝公於宋襄之報宜如何哉而曹南之盟齊人不與不惟忘徳背誼去順從逆而復乘其兵敗讎宋圍緡左氏之言其不可信三也春秋之法凡公子取國有奉焉曰歸無奉焉曰入伐而歸之曰納今公子昭一無稱焉左氏之言其不可信四也桓公管仲屬孝公於宋襄以為世子則伐而納之誼也今齊人及戰而經以宋為主曲宋而直齊左氏之言其不可信五也僖二十七孝十夏六月庚寅齊侯昭卒文十四昭二十夏五月乙亥齊侯潘卒齊公子商人弑其君舍案左氏傳昭公弟宻姬子商人驟施於國而多聚士五月昭公卒舍即位七月乙卯夜商人弑舍而讓元元曰爾求之久矣我能事爾商人遂自立是為懿公又案舍未逾年而稱君者已即位也春秋凡所書未逾年而稱君者皆已即位也宣十年四月齊侯元卒冬書齊侯使國佐來聘則是頃公已即位成四年三月鄭伯堅卒冬書鄭伯伐宋則是悼公已即位文十八懿四夏五月戊戌齊人弑其君商人案左氏傳懿公游于申池閻職僕邴歜㕘乗二人謀弑公納諸竹中歸舍爵而行齊人立公子元是為惠公春秋稱人以弑者三此及文十六年宋人弑其君杵臼襄三十一年莒人弑其君宻州杵臼則襄夫人王姬使帥甸攻而殺之商人雖死於閻職邴歜之手而公子元實受其國二人者一為祖母一為庶兄非臣子故不以斥其名但曰國人云耳逺之之辭也何以知元之非臣子也以其曰夫已氏而知之也非臣子也而猶曰弑其君者各正其名而已名正則是非定監戒彰宣十惠十己巳齊侯元卒齊崔氏出奔衞左氏傳齊惠公卒崔杼有寵於惠公髙固畏其逼也公卒而逐之奔衞書曰崔氏非其罪也且告以族不以名是不然春秋凡兩書氏尹氏即其世稱而書氏崔氏即其族大宗强見逐而書氏故穀梁氏曰氏者舉族而出之之辭也其後崔杼竟以家亂遂致滅宗之禍豈亦聖人書氏之明驗歟成九七頃十秋七月丙子齊侯無野卒襄十九八靈二十秋七月辛卯齊侯環卒襄二十五莊六夏五月乙亥齊崔杼弑其君光哀五十八景五秋九月癸酉齊侯杵臼卒哀六悼元齊陳乞弑其君荼哀十悼四三月戊戌齊侯陽生卒春秋諸國統紀卷三
