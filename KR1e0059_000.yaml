body:
  text: 春秋諸國統紀春秋類提要臣等謹按春秋諸國統紀一卷目録一卷元齊履謙撰履謙字伯恆大名人官至太史院使事迹具元史本傳此書乃其延祐丁巳為國子司業時所作前有自序謂今之春秋蓋聖人合二十國史記為之自三傳専言褒貶于諸國分合與春秋所以為春秋槩未之及故敘類此書以備諸家之闕凡二十有二篇首魯次周次宋次齊次晉次衛次蔡次陳次鄭次曹次秦次薛次杞次滕次莒次邾次許次宿次楚次吳自內魯尊周外各以五等之爵為次其入春秋後降爵者則隨所降之爵列之而楚吳以僭王殿焉目録謂此皆國史具在聖人據以作春秋者又以諸小國諸亡國釐為二篇附録于末目録謂此無國史因二十國事所及而載者皆先于各國下列敘大勢與其排比之意題曰某國春秋統紀蓋據墨子有百國春秋徐彥公羊疏有孔子求周史記得百二十國寶書之文故不主因魯史從赴告之義也案春秋如不據魯史不應以十二公紀年如不從赴告不應僖公以後晉事最詳僖公以前晉乃不載一事此蓋掇拾雜説不考正經且魯史不紀周年內魯可也履謙分國編次而魯第一周第二不曰王人雖微加于諸侯之上乎况天王也至于隱公八年葬蔡宣公宣公十七年葬蔡文公並經有明文履謙漏此二條乃于桓公十七年葬蔡桓侯謂諸國皆僭稱公惟蔡仍舊章反引左傳為證殊為疏舛又經書桓公三年夫人薑氏至自齊六年九月丁卯子同生其事更無疑穀梁傳疑故明之之説已為不核事實履謙乃竟以莊公為齊侯之子尤為乖謬以其排比經文頗易尋覽所論亦時有可采故録存之吳澄序稱其縷數旁通務合書法間或求之太過要之不苟為言蓋瑕瑜不掩澄已有微詞矣乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋諸國統紀序讀三百五篇之詩曰有美有刺也讀二百四十二年之春秋曰有褒有貶也蓋夫子既殁而序詩傳春秋者固已云然則非秦漢以後之儒創為是説也説經而迷於是也千年矣逮自朱子詩傳出人始知詩之不為美刺作若春秋之不為褒貶作則朱子無論著夫孰從而正之有惑有不惑者相半也邵子曰聖人之經渾然無迹如天道焉春秋書實事而善惡形于其中矣至哉言乎朱子謂據事實書而善惡自見其旨一也唐啖趙宋孫劉而下不泥於傳有功於經者奚啻數十家然褒貶之蔽猶未悉除必待宋末李吕而後大不惑夫其所謂褒貶者以書時書月書日為詳略其事以書爵書人書國為榮辱其君以書字書氏書名書人為輕重其臣而已噫事之或時或月或日也君之或爵或人或國也臣之或字或氏或名或人也法一定而不易豈聖人有意於軒輊豫奪之哉魏郡齊履謙伯恆甫之説春秋則異是不承陋襲故皆苦思深究而自得內魯尊周之外經書其君之卒者十八國乃分彚諸國之統紀凡二十已所特見各傅于經縷數旁通務合書法餘事闕而不録其義視李則明決多其辭視吕則簡淨勝豫之所可靡或不同間有不同亦其求之太過爾而非苟為言也不具九方臯相馬之眼者又焉能識之伯恆甫之篤志經學知之雖久晚年獲覩其二書之成寧不快於心與二書謂何易春秋也臨川吳澄序欽定四庫全書春秋諸國統紀目録孔子曰屬辭比事春秋教也所謂春秋者古者史記之通稱也何以明之孟子曰王者之迹熄而詩亡詩亡然後春秋作莊子曰春秋先王經世之志墨子曰吾見百國春秋皆非謂今之春秋也又嘗考之古文有夏商春秋又有晉春秋國語晉羊舌肸習於春秋悼公使傅其太子楚莊王使申叔時傅太子針教之春秋左傳韓宣子適魯見魯春秋至於後世史學亦多以春秋名其書者若虞卿春秋吕氏春秋陸賈春秋吳越春秋漢魏春秋唐春秋之類往往有之故知春秋者古者史記之通稱而今之春秋一經聖人以同會異以一統萬之書也始魯終吳合二十國史記而為之也然自三傳既分世之學者類皆務以褒貶為工至於諸國分合與夫春秋之所以為春秋未聞其有及之者豫竊疑之久矣暇日輒以所見妄為敘類私之巾篋蓋不惟有以備諸家之闕庶幾全經之綱領而自此或可以尋究云延祐四年丁巳夏六月乙未朔沙鹿齊履謙謹書魯國春秋統紀第一孔子嘗曰我欲觀夏道是故之杞而不足證也我欲觀商道是故之宋而不足證也我觀周道幽厲傷之吾舍魯何適矣此聖人所以託魯史以寓王法也故學春秋者當先觀聖人所書一魯十二公二百有四十二年之事其文可證也其誼可推也其治亂得失反復一代之變可覆而視也始於隱元者魯史之所自起也志禮樂志征伐志會盟志賦稅志軍甲志城築志田邑志災異志世卿志夫人內女獨備於諸國者非特為詳內録也夫以春秋而視周典則魯為極亂以魯而視當時齊晉諸國則豈無所謂一變再變至道難易之等差哉因其事著其筆削蓋所以訓也後之作者尚有考於斯故敘魯國春秋統紀第一周王春秋統紀第二詩降黍離於國風示天下不復有雅春秋夷周室於侯邦傷王道莫之能亢也當是時周史固在也十三王之世次先後可考也然而春秋不以周統書元而但以周正首事其意可知也書歸物者三書來求者三書錫命者三書出師者三書天王出居于鄭繼書天王居于狄泉入于成周書王扎子殺召伯毛伯書天王殺其弟佞夫繼書王室亂王子猛卒德日朘力日蹙變日極矣孔子曰如有用我者吾其為東周乎蓋傷周室陵遲雖有繼世之王亦不能以復興矣此制作之本旨也豈但禮樂征伐不自已而出哉故敘周王春秋統紀第二宋國春秋統紀第三公羊氏曰大國言齊宋夫宋王者之後而中國之望也陳舜之後也杞夏之後也宋商之後也原其始封皆公爵也而在春秋陳但稱侯杞則始稱侯至莊之二十七年書伯僖之二十三年降而書子訖春秋之世凡三書而三降焉惟宋獨終始公爵雖襄公圖霸無功戰敗身傷而宋為諸侯之望曽不改舊故晉文以解宋圍而成一戰之霸悼公以討魚石而興三駕之功春秋外平不書至宋楚平則書之其大勢可見矣故敘宋國春秋統紀第三齊國春秋統紀第四五霸前此未有也齊創之而晉次之也雖然當是時也王道衰諸侯恣威勢以相脅傾詐以相尚天下皆是也大則宋魯衛鄭之邦小則邾莒滕薛之國其能知尊周者誰歟以禮為國者誰歟推其本心無非桓文也考其行事亦無非桓文也其所以不為桓文者非不欲也特智有所不逮力有所不及耳故孟子論春秋不舉他國而獨以二公為稱者意蓋如此故敘齊國春秋統紀第四晉國春秋統紀第五近代永嘉陳氏有言古者諸侯無私史晉之乘楚之檮杌魯之春秋皆東遷之史也今以此言考之春秋凡諸侯書卒者皆有國史以考其世次者也其不書卒者或國滅失其本史或國雖在而未有史皆無所考其世次者也又其世次有入春秋即見者有近後方有者若秦至文十八年始書康公卒薛至莊三十一年始書薛伯卒杞至僖二十三年始書成公卒莒至成十四年始書渠丘公卒邾至莊十六年始書邾子克卒許至僖四年始書穆公卒楚至宣十八年始書莊王卒吳至襄十二年始書王壽夢卒晉則至僖九年始書獻公卒凡此其史之所起有久近故其世次所書有先後然則陳氏之言於是乎信故敘晉國春秋統紀第五衛國春秋統紀第六子路問於孔子曰衛君待子而為政子將奚先孔子曰必也正名乎名不正則言不順事不成禮樂不興刑罰不中而民無所措手足夫靈公黜其子而子其孫出公不父其父而禰其祖蒯聵爭入曼姑圍戚至此則人倫之不正甚矣故夫子因子路之問而啓之然此言也雖則專為衛輒而發夷考春秋所書若州吁若惠公若公孫剽本其禍亂無非不知正名之罪然後知夫子之言所包者廣非止於一人一事而已也不然衛以康叔封國察其政俗兄弟吾魯加以內無專國之臣外少諸侯之事於斯時也苟能君君臣臣父父子子兄兄弟弟夫夫婦婦人倫之無不適其正也其於禮樂之興也何有故敘衛國春秋統紀第六蔡國春秋統紀第七古者王制諸侯之爵次其先後有序在周官大司馬設儀辨位以等邦國猶天建地設不可亂也及春秋時禮制既亡霸者以意之向背為升降諸國以勢之強弱相上下故自入春秋蔡常先衛隱十年伐戴書宋人蔡人衛人桓五年伐鄭書蔡人衛人陳人十四年又伐鄭書齊人蔡人衛人陳人十六年會于曹猶書宋公蔡侯衛侯皆先衛也自是厥後伐鄭之役納衛惠之師遂序於衛陳之下矣雖云至有後先亦以國勢孱弱不能自強於治可見矣其世從楚而受楚禍也宜哉故敘蔡國春秋統紀第七陳國春秋統紀第八春秋赴告之説始於左氏其言曰諸侯有命告則書不然則否師出臧否亦如之雖及滅國滅不告敗勝不告克不書于策其意本謂鄰國相好或同惡以相仇或同利以相濟於是乎有赴告之命如傳言宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道鄭人以王命告伐宋之類非謂每事每國必皆赴告凡春秋所有事皆當時承赴告而書者誠如此言不惟當時諸侯封壤有逺近情好有疏密而且國有諱忌事固有不可告與夫不當告及不能告者而春秋備書之桓五年春正月甲戌己丑陳侯鮑卒甲戌之下本闕陳他作亂事而左傳以謂陳亂國人分散故再赴昭九年夏四月陳災陳亡矣定無來告者而胡氏以謂叔弓會楚子于陳還言之朝凡若此者皆泥於赴告之説之弊也要之春秋之作各從本史於理為通赴告之説恐不盡然也故敘陳國春秋統紀第八鄭國春秋統紀第九鄭在春秋列國最為後封於諸姬為近然當春秋之初鄭為亂階書克段書來渝平書歸祊書假許田書從王伐鄭皆特筆也其後方楚之北征諸夏而鄭與陳蔡許四國適當其衝陳蔡許終始春秋甘為楚之從而鄭介晉楚之間居二國必爭之地朝從楚盟晉師暮至暮從晉盟楚師朝至其為國也難哉向非子産以禮自固使晉楚之暴不能加焉則鄭國之丘墟當不終於春秋矣善乎劉安世之論曰鄭蕞爾國又時有君臣之亂得子産然後安然子産為政時晉楚漸衰又能事之區區小國攝乎大國之間能自保已為難若妄作則滅亡矣傳稱子産善相小國謂此也故敘鄭國春秋統紀第九曹國春秋統紀第十春秋志用兵輕重淺深各有不同而其甚莫極於滅滅者亡國之重辭也宋景公入曹以曹伯陽歸春秋止書入而左氏傳其事謂曹伯陽好田弋鄙人公孫疆因進田弋之説陽好之疆因言霸説陽乃背晉而姦宋宋伐之晉不救而遂滅故嘗因是考之經有書滅而實未嘗滅者襄六年書莒人滅鄫昭四年書取鄫是則鄫未嘗滅定六年書鄭遊速帥師滅許以許男斯歸哀十三年書許男成卒則是許未嘗滅亦有經書入而傳則謂滅國亦不復見者僖三十三年書秦人入滑傳謂滅滑而還而滑亦不復見哀八年書宋公入曹傳謂晉不救而遂滅而曹亦不復見蓋未嘗滅者或復存之其入而國不復見者皆自亡也故敘曹國春秋統紀第十秦國春秋統紀第十一秦自穆公始入春秋僖十五年與晉惠公戰于韓原其勢固已悍然矣及再納晉文主盟中華穆公外雖從晉盟會內則蓄其威武投間抵隙待時而發故文公方卒今年滅滑明年伐晉用敗殽之帥出罪已之言威行東夏奄宅西戎斯可謂秦之顯公矣故春秋秦自彭衙以前入滑圍鄭盟于翟泉會于溫師于城濮凡穆公之事莫不皆備録之康共而下則若有不盡記者非闕文也直謂其不足詳耳故敘秦國春秋統紀第十一薛國春秋統紀第十二春秋降爵之國薛自侯降為伯滕自侯降為子杞自公降為侯又降為伯又降為子雖其所以降不可知固以見其國勢朘削日就卑替或曰薛與滕杞自入春秋不與諸侯會盟者各百餘年至成五年蟲牢始書杞伯成十三年伐秦始書滕人襄元年圍彭城始書薛人其曰日就卑替者何也曰是又不然夫春秋之有會盟本所以控大國扶小國也故其徵令不濫而諸侯有序葵丘之盟盟之大者也而與盟者止於八國杞滕薛不在焉踐土之盟亦盟之大者也而與盟者亦止於八國杞滕薛亦不在焉此桓文之盛而小國所以賴也霸政下衰盟會數而賦役煩雖大國容有不至而小弱如杞滕薛之倫莫不奔走而聽命雖空乏其國家困踣於道路而有不遑恤者且宋災細故也為會而更所喪者十有二國也城杞末務也相率而受其功者亦十有二國也甚而至於晉定之召陵之役在會者十有八國而劉子且不數焉其得失可知也由是言之其得與於會盟者非進之也適所以就其卑替耳故敘薛國春秋統紀第十二杞國春秋統紀第十三杞既降而書子矣而又退從人臣之列其降而書子吾不知其所從來退從人臣之列則有任其責者矣何以見其退從人臣之列也以襄二十九年書杞子來盟則見之也經有書來盟者矣桓十四年鄭語來盟閔二年齊高子來盟僖四年楚屈完來盟文十五年宋華孫來盟宣七年衛孫良夫來盟皆人臣也固未有諸侯書來盟者亦未有與諸侯盟而不書公者也左氏曰杞文公來盟書曰子賤之也此説非也賤之之意其不在於書子也夫杞夏之後而天子之事守也禮秩之降一至如此宜乎夫子嘗曰吾説夏禮杞不足徵也故敘杞國春秋統紀第十三滕國春秋統紀第十四春秋以諸侯而旅見於諸侯惟二事滕侯薛侯邾人牟人葛人是也何以知為旅見即其所書而知之也古者諸侯之邦交名位不同禮亦異數至於旅見則必均其辭號者所以一貴賤齊等威也然則謂之侯者以君禮見者也不謂之侯者不以君禮見者也滕本非侯也薛亦然或者之説有如此者故敘滕國春秋統紀第十四莒國春秋統紀第十五莒介居齊魯之境齊雖見伐而莒曽不敢少陵齊焉魯則自宣公平莒及郯莒人不肯至再會齊伐之干戈相尋迄無寧歲當襄公之世曽不數年而莒人伐我者三侵我者一亦可謂之強國矣故春秋書莒每次於鄭曹之下至於入向取牟婁滅鄫皆強國事也故敘莒國春秋統紀第十五邾國春秋統紀第十六春秋世卿非惟大國有之雖小國亦有之矣莒牟夷邾庶其畀我邾快黑弓是也若邾儀父或以為子克字或以為大夫之名案魯有行父歸父晉有林父鄭父甲父是皆大夫名然則謂儀父為名者非無據也夫邾魯附庸之國其來朝於魯者數矣而魯之君臣所以每加兵於邾者其意責邾之不恭猶深也故既納其邑又分其田既又入國而以其君歸必期至於滅亡而後已豈先王保小寡之道哉公行鮮有不書至者惟伐邾則悉不書至豈以邾為邦域之中七百里之內歟故敘邾國春秋統紀第十六許國春秋統紀第十七春秋之班齊侯爵也自入僖公常序于宋公之上邾子爵也常序于薛伯之上許男爵也常序于曹伯之上復有在邢侯之上者甚而至於蜀之盟秦序宋上鄭序齊上皆習亂之事也故統紀自內魯至於降周而下並依王爵曰公曰侯曰伯曰子曰男爵同以親晉當先齊以齊為霸者之倡特列居侯爵之首荆吳僭號王爵不加焉故附于五等之後凡此庶幾春秋聖人所以道名分之意云故敘許國春秋統紀第十七宿國春秋統紀第十八春秋自遷不書有遷之者而後書然書曰某人遷某者遷以內屬也宋人遷宿齊人遷陽是也書曰某遷于某者遷以避難也邢遷于夷儀衛遷于帝丘蔡遷于州來許遷于葉于白羽于容城是也雖所遷不同而其國之危弱不能自守一也悲夫故敘宿國春秋統紀第十八楚國春秋統紀第十九荆吳僭竊名號不與中國通者各十餘世自入春秋雖其因事制宜誼存筆削然其君書卒其大夫書名書聘使書會盟書帥師皆與諸夏冠帶之國並列無間蓋二國之罪以先王王法論之則外之攘之誅之絶之可也以春秋信史言之則聖人拳拳於中外盛衰之變者深矣詳其事存其實録所以為後世鑒也故其書法如此故敘楚國春秋統紀第十九吳國春秋統紀第二十吳國于東南去中夏尤逺成七年吳伐郯始見於經于鍾離于善道于柤于向皆諸侯就而會之其來交于中國者于戚而止耳雖則資之以疲楚然吳亦亢矣艾陵之戰齊黃池之駕晉其末流有必至者春秋書之欲後世謹其始也故敘吳國春秋統紀第二十諸小國春秋附録第二十一諸亡國春秋附録第二十二諸小國二十二亡國四十三右春秋諸國統紀合二十二篇前二十篇皆當時國史具在聖人本所據以作春秋者也後二篇皆無國史因以上諸國事所及者也故附録之於以備見春秋之國數云其亡國已具於前卷者此不復重録春秋諸國統紀目録
