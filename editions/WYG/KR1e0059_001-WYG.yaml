body:
  text: 春秋諸國統紀卷一元齊履謙撰魯國第一上魯姬姓國周公子伯禽始封十四世至隱公息姑實為春秋所起隱公桓公莊公閔公元年春王正月春秋合二十國史而創為内魯之制首以隱元者本魯史之自起次以周正者示王法所當奉蓋當是時王政不行不惟禮樂征伐不自周出至於紀年亦國自為厯或以周正或以商正或以夏正考之漢唐厯志可見故聖人於是因其制作而首為正之周之正月在夏商為十一月周之二月在夏為十二月在商為正月周之三月在夏為正月在商為一月故正月書王二月書王三月書王孔子所謂吾從周公羊氏所謂大一統穀梁氏所謂謹始杜氏所謂因其厯數附其行事皆此意也過三月則不書者非三正所建也隱不書即位者即位於歲前也自隱至哀十二公即位於逾年者七桓文宣成襄昭哀書王正月公即位者是也即位於歲前者四隱莊閔僖書王正月不書公即位者是也逾年不得即位者一定不書王正月者是也逾年即位禮也失之先者不待以禮失之後者不能以禮三月公及邾儀父盟于蔑單盟曰及㑹而後盟曰㑹故公與諸侯盟者四十一而書及者六公與大夫盟者十四而書㑹者三大夫之㑹公常少而諸侯之㑹公常多九月及宋人盟于宿盟不書公者凡八成三年及荀庚盟及孫良夫盟十一年及郤犫盟襄十五年及向戌盟皆因聘而盟者其不書公者傳曰國與之也餘四盟此年及宋人盟于宿莊二十二年及齊高傒盟于防文二年及晉處父盟十年及蘇子盟于女栗皆闕文公子益師卒案魯卿之見於經世其位而受氏者凡九家合三十八人其書卒者三十人益師衆氏一人書卒彄臧氏四人三人書卒一出奔無駭展氏一人書卒挾所氏一人書卒自莊以下有仲孫氏七人五人書卒一出奔一卒在經後叔孫氏九人六人書卒一出奔一見殺一卒在經後季孫氏四人俱書卒僖以下有仲氏三人二人書卒一出奔宣以下有叔氏八人七人書卒一卒在經後其非世卿而不書卒者五人柔溺公子翬公子結公子憗又有見殺者二人公子買公子偃皆以事特書者亦非世卿然則以上凡九家者皆所以與魯終始春秋卒之使後世之有國家者即其所書而知其世即其世次而覽其事其為訓戒之誼豈不深切著明故曰春秋者性命之文二年無駭帥師入極君將不言帥師大夫將則言帥師者以見其不可專有民衆然在外惟世卿書帥師非世卿但稱人不書帥師既非世卿又非卿則止書師此一字内外皆用之凡言師者卒乘之通稱也又有兵有所屬而稱師者與承上省文而稱師者兵有所屬而稱師者晉侯齊師宋師秦師及楚人戰于城濮之類是也承上省文而稱師者上書楚公子棄疾帥師圍蔡下書楚師滅蔡之類是也凡當書帥師而不書者皆闕文也又若戰稱人敗稱師來稱人追稱師乞師棄師取師之類事雖不同其為卒乘之通稱則一九月紀裂繻來逆女卿為君逆則稱女自為逆則稱字母為子逆則稱婦女者從父母所稱之辭字者兄弟辭婦者對姑之辭冬十月伯姬歸于紀經書内女適於諸侯及其大夫者凡十有二各以書法别之書歸者五而書卒者四紀伯姬紀叔姬鄫季姬宋伯姬也書歸不書卒者一杞伯姬也不書卒者文闕也不書歸與卒者郯伯姬齊子叔姬也二女者皆見出者也杞叔姬亦見出而書卒歸其喪也皆諸侯夫人也書逆不書歸者二叔姬也子叔姬也皆大夫妻也大夫自為逆者也直書卒者二伯姬也子叔姬也魯女之不嫁者也特卒之也故凡内女當書卒而不卒罪在卒者不當書卒而卒罪在卒之者三年春王二月己巳日有食之推厯當為周正三月己巳朔案經書日食三十六今以授時厯推之頻月不應有食者二襄二十一年冬十月庚辰朔二十四年八月癸巳朔距前月合朔去交三十一度弱定无再食之理非常之變亦不至此並傳寫之誤變交不食者一宣公十七年六月癸夘案是年六月无癸夘其食限亦不在六月推厯當為周正五月乙亥朔入食限泛交分初日四千一百定交度陽厯十度依法變交不食亦傳寫之誤月日朔合者十七莊公二十六年十二月癸亥朔僖公五年九月戊申朔文公十五年六月辛丑朔宣公十年四月丙辰朔經闕朔字成公十六年六月丙寅朔襄公十四年二月乙未朔二十年十月丙辰朔二十一年九月庚戌朔二十三年二月癸酉朔二十四年七月甲子朔昭公七年四月甲辰朔二十一年七月壬午朔二十二年十二月癸酉朔二十四年五月乙未朔三十一年十二月辛亥朔定公五年三月辛亥朔十五年八月庚辰朔差一月者十二隱公三年二月己巳推厯當為周正三月己巳朔闕朔字桓公三年七月壬辰朔推厯當為周正八月壬辰朔十七年十月朔推厯當為周正十一月庚午朔闕庚午字莊公二十五年六月辛未朔推厯當為周正七月辛未朔案左氏傳言唯正月朔慝未作於是乎伐鼓用幣詳其傳意是謂此食不在正月之朔故言唯以明其非禮不在正月之朔則不得為之六月矣書六月者傳寫之誤三十年九月庚午朔推厯當為周正十月庚午朔僖公十五年五月推厯當為周正四月癸丑朔闕癸丑朔字文公元年二月癸亥推厯當為周正三月癸亥朔闕朔字成公十七年十二月丁巳朔推厯當為周正十一月丁巳朔襄公十五年八月丁巳推厯當為七月丁巳朔闕朔字二十七年十二月乙亥朔推厯當為十一月乙亥朔左氏傳亦作十一月足證經文傳寫之誤昭公之十五年六月丁巳朔推厯當為周正五月丁巳朔定公十二年十一月丙寅朔推厯當為周正十月丙寅朔差二月者二莊公十八年三月推厯當為周正五月壬子朔闕壬子朔字僖公十二年三月庚午推厯當為周正五月庚午朔闕朔字差三月者二宣公八年七月甲子推厯當為周正十月甲子朔闕朔字昭公十七年六月甲戌朔推厯當為周正九月甲戌朔又案左氏傳解此一事其説自分三節夏六月甲戌朔日有食之祝史請所用幣平子曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣其餘則否此一節見經文元非六月皆後世傳寫之誤太史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉避移時樂奏鼓祝用幣史用辭故夏書曰辰弗集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也此一節是説夏正九月雖非春秋所書之正然亦可以見經文六字本作九字當夏四月是謂孟夏平子弗從昭子退曰夫子將有異志不君君矣此一節復説周正六月要之春秋文多闕誤推此類可見然春秋書日食而不書月食者月食時已有術可推故詩曰彼月而食則惟其常言其有常數也四年夏公及宋公遇于清㑹而莫適為主曰遇又曰禮均曰遇故志内之遇者三而皆以此及彼志外之遇者四而皆以尊及卑秋翬帥師㑹宋公陳侯蔡人衞人伐鄭伐者出師之總名周禮大司馬掌九伐之法眚壇侵削正殘杜滅伐總謂之伐正猶春秋書伐其侵圍入滅之類皆伐之事也然經有重言其事者有不重言其事者有但言其事而不言伐者重言其事者如伐鄭圍長葛伐杞取牟婁之類是也必繫之國以見其為某國之邑也不重言其事者如伐楚次于陘伐鄭㑹于蕭魚之類是也雖曰伐而實未有事乎伐也但言其事而不言伐者侵入滅及圍國之類是也不言伐者省文也又如戰而言伐者伐兵也不言伐者非伐兵也及齊師戰于奚傳言疆事也及楚人戰于城濮經書楚人救衞之類是也亦有史失其事而經則泛書曰伐者翬帥師㑹伐鄭之類是也不然春秋何以紀用兵之名而惟伐為多五年春公矢魚于棠矢公穀皆作觀左氏傳亦作陳魚而觀之案公羊又言千金之魚公張之而春秋不謂之張魚而曰觀魚者内辭也常事曰視非常曰觀或曰矢即矢繳之矢今之摽魚是也九月考仲子之宫初獻六羽魯僭天子之禮樂故春秋必每事而正之然書初者本其失禮之始所可言也僭諸公者也不書初者因事以懲慝所不可言也僭天子者也考仲子之宫將萬焉問羽數於衆仲衆仲對曰天子八諸侯六大夫四士二夫舞所以節八音行八風故自八以下據此言之則樂舞之僭其自衆仲始螟螟蟲災也案春秋所書有災有異害及於民之謂災物反其常之謂異然二者魯皆備書諸國惟異則書之故周書宣榭災晉書沙鹿梁山崩齊書大災一宋書災四大水一隕石鷁退飛各一雨螽一陳書災一宋衞陳鄭書同日災一皆異也蓋災則事止一國異則理闗天下故於内外所書如此七年夏城中丘邑郭曰城古者城郭有度侯伯之國面方五里徑三百雉大都不過三國之一中五之一小九之一春秋之時不法不制自中丘迄于邾瑕凡書内城二十有六有益城無極者有城中城以自固者有併城二邑以困民者有用師徒城以虞難者有城其食邑以張私家者而聖人悉書於經其事則皆為横僭而其志則存乎復古八年三月鄭伯使宛來歸祊庚寅我入祊我者對彼之稱然春秋書我者唯二事我入祊以見彼亦有同欲入之者歸我濟西田以見彼亦有同田於濟西者蓋濟西之田魯不盡有泰山之祊齊亦欲之九年挾卒案魯世卿之族其嗣不見於經者三人然益師之後傳有衆仲無駭之後傳有展禽展喜展瑕展莊叔展王父惟挾之後無人或所氏之世至挾而絶或其子孫更微無事可見或當是時國之紀綱猶在於君盟㑹侵伐多親制之故雖有世卿而名氏不登於史册春秋之作亦據其所見者耳十年六月壬戌公敗宋師于菅辛未取郜辛巳取防昔孟子有言太公之封於齊為方百里也周公之封於魯亦為方百里也今魯方百里者五徒取諸彼以與此仁者且不為况於殺人以求之今觀春秋所書取田者四取邑者八取附庸者五滅國者一歸田者二歸邑者二以邑來奔者三外取内田邑者四雖未能盡合孟子之説然侵暴亦多矣聖人備存而弗削所以辨封域息爭奪也十有一年冬十有一月壬辰公薨案左氏傳羽父請殺桓公將以求太宰公曰為其少故也吾將授之矣使營菟裘吾將老焉羽父懼反譖公于桓公而請弑之十一月公祭鍾巫館于蔿氏羽父使賊弑公于蔿氏立桓公而討蔿氏有死者不書葬不成喪也又案魯十二公為内弑者二皆以賊臣當國不成喪不書葬不惟魯也宋與夷以華督當國不書葬宋捷以南宫萬當國不書葬晉卓以里克當國不書葬齊舍以公子商人當國不書葬宋杵臼以公子鮑當國不書葬齊商人以公子元當國不書葬晉夷臯以趙盾當國不書葬鄭夷以公子歸生當國不書葬晉州蒲以欒書當國不書葬齊光以崔杼當國不書葬衞剽以甯喜當國不書葬齊荼以陳乞當國不書葬元年鄭伯以璧假許田假田胡為書于策非假也非假而曰假者内辭也以是知春秋於魯事多内辭或曰此鄭伯之所以為諼也克段似仁歸祊似誼假田似禮渝平似信二年三月公㑹齊侯陳侯鄭伯于稷以成宋亂夏四月取郜大鼎于宋戊申納于太廟結平曰成左傳宋華元克合晉楚之成又鄭人使王子伯駢行成皆謂其徃來文説而使之平也華督弑其君宋人以為討故魯桓㑹諸侯以成之曰㑹曰以曰取曰納辭煩而不殺皆所以病公也又案宋人為亂而我則平之是則為之成亂宋人討亂而我則平之是不謂之成亂然則猶曰成宋亂者内辭也公及戎盟于唐冬公至自唐案公行反至必書於策者此史氏之常然春秋凡公行一百七十二而書至者八十不書至者九十二公行不出境者不書至雖出境事不在魯史者不書至公行不出境不書至者亦史氏之常也事不在魯史不書至者本所闕也三年夫人姜氏至自齊春秋歴十二公夫人之見於經者隱桓莊僖文宣成隱夫人以子氏不書葬可證自桓以下凡六公具有逆至明文其餘經所不見者閔則以方幼未娶而卒故無所書此則然矣若襄則有昭母齊歸昭則有孟子定則有哀母定弋或以為妾或以為夫人皆無逆至明文可見者也以為得禮則孟子非得禮者以為失禮則何以不備書於經惟深明夫聖人所以立教之意與其春秋内辭之㫖自當有以辨之今不盡釋也四年春正月公狩于郎狩于郎非其地也中春教振旅遂以蒐中夏教茇舍遂以苗中秋教治兵遂以獮中冬教大閲遂以狩皆天子之禮諸侯何為有此名然不時則傷農不地則害稼故春秋因事以明僭五年大雩諸侯曰雩雩於山川天子曰大雩雩於上帝此亦因事以明僭又案天子有雩諸侯亦有雩天子有社諸侯亦有社雩社雖同所以為雩社則異故春秋大雩則書鼓于社則書皆非禮之禮也六年九月丁夘子同生世子生不書而獨書子同者左氏傳云以太子生之禮舉之穀梁云疑故志之以太子生之禮舉之者事也疑故志之者意也春秋書其事所以使後世微見其意或曰莊公信非桓公之子聖人當明言之曰不然夫桓莊之事聖人烏得而知之假使知之而亦烏可言也昭公娶呉孟子此事之顯然者聖人猶為之隱曽謂桓莊之事而聖人肯言之乎且春秋一書聖人誼存筆削其善其惡為法為戒則皆付諸後人故先儒嘗言春秋議而不辨又曰婉而成章謂桓莊之事而聖人言之豈春秋㫖哉八年冬十月雨雪冬十月今之八月書失時也詩小雅十月之交朔日辛夘日有食之今以授時厯推之周幽王六年歲在乙丑距延祐丁巳二千九十二年是歲實以夏正八月辛夘朔入食限是周人改月數之一證也故春秋凡三書雨雪兩皆言大此獨不言大言大者以大為異不言大者以失時為異又案三代正朔商則改正不改朔周則正朔時皆改以十一月為正月正也月數從子起朔也以子為孟春時也故孔子告顔淵曰行夏之時是言周時之不正也至書於春秋則曰春王正月並存當時之實使後世觀其得失而損益可知是則聖人之志也十有二年十有二月及鄭師伐宋丁未戰于宋戰伐不書主帥者凡九桓二年入杞八年伐邾十年齊衞鄭來戰于郎此年及鄭伐宋十七年及齊師戰于奚及宋人衞人伐邾莊九年及齊師戰于乾時僖四年及江人黄人伐陳二十二年及邾人戰于升陘以上九事内省文者三以國與之者三闕文者三先書十有一月丙戌公㑹鄭伯盟于武父次書十有二月及鄭師伐宋先書夏公伐齊納糾次書八月庚申及齊師戰于乾時先書春正月公㑹諸侯伐楚次書秋及江人黄人伐陳皆一出而再有事其不書主帥者省文也戰于郎于奚于升陘郎奚升陘皆魯地或經以來戰為文或傳以疆事為解其不書主帥者國與之也桓二年入杞八年伐邾十七年再伐邾其不書主帥者闕文也十有四年秋八月壬申御廩災乙亥嘗經書烝祭二嘗祭一禘祭二是皆天子之禮而諸侯所不得為者故特書祭名以明其僭若如舊説以再烝見瀆則古人有時享月薦相距五月不可謂瀆御廩災乙亥嘗以為未易災之餘則但書有事其誼已明何必曰嘗故嘗考之他書詩歌載嘗禮舉重祭明堂位備言魯僭禮樂之事而嘗烝省蜡與大禘並書蓋四時之祭雖通乎下而等差名品貴賤不同是豈可以毫髮僭差哉此聖人所以因事以著其罪也十有八年公㑹齊侯于濼公與夫人姜氏遂如齊僖十一年書公及夫人姜氏㑹齊侯于陽榖此書公與夫人姜氏遂如齊及者尊卑之辭公夫人同行者也與者不相屬之辭公夫人不同行者也夫人之惡於是乎見夏四月丙子公薨于齊元年三月夫人孫于齊桓公薨夫人猶避在齊是年三月始歸於魯春秋欲見其事故因其告至之日而追言其去國之久夫人之罪著矣其曰夫人孫于齊而不稱姜氏者承上如齊文是謂一事而再見故前目而後凡夏單伯送王姬送王姬當依公穀作逆單伯王卿士而宦於諸侯者魯有單伯鄭有祭仲陳有女叔皆是又案左傳齊有王子成父王孫揮鄭有王子伯駢當是時不惟異姓之臣雖王族亦有宦於諸侯者二年秋七月齊王姬卒春秋於齊王姬書之如魯夫人書單伯逆王姬即公子翬公子遂叔孫僑如之逆女也書王姬歸于齊即文姜穆姜齊姜之書至也書齊王姬卒即魯夫人之一切書薨也我魯侯也既為齊逆又為齊歸又為齊卒而喪之由是觀之孰謂莊公非齊襄之子者三年春王正月溺㑹齊師伐衞内大夫將不稱帥師者凡九此年溺㑹齊師伐衞十四年單伯㑹伐宋文三年叔孫得臣㑹伐沈九年公子遂㑹救鄭宣十一年公孫歸父㑹伐莒成八年叔孫僑如㑹伐鄭襄元年仲孫蔑㑹圍彭城十四年叔孫豹㑹伐秦十六年叔老㑹伐許皆闕文或曰凡大夫㑹伐不稱帥師者不以師㑹也四年冬公及齊人狩于禚齊人者齊侯也其不言齊侯者蓋言侯則醜公從之言人則從公不疑是亦内辭也莊公越禮不顧逺㑹齊侯以狩猗嗟之刺實作於此觀其末句曰展我甥兮蓋為疑辭以諷之也孰謂莊公非齊襄之子者八年春王正月師次于郎以俟陳人蔡人甲午治兵夏師及齊師圍郕郕降于齊師秋師還師次于郎為一事治兵至師還為一事莊公將㑹齊圍郕厲兵以出振旅而入樂收滅同姓之惡於己而歸降郕之利於齊春秋書魯用師蓋未有如是之詳孰謂莊公非齊襄之子者九年夏公伐齊納子糾當依公榖無子字又十六年盟幽當依公羊有公字三十年次成當依公榖有師字僖十九年盟齊當依公榖有公字二十九年盟翟泉當依公榖有公字襄十七年圍防高厚字上當依公穀有齊字以上並左氏闕文隱三年君氏卒當依公穀作尹氏卒宣十六年宣榭火當依公穀作宣榭災襄十四年衞侯出奔齊當依公穀有衎字昭二十一年蔡侯朱出奔楚當依穀梁作蔡侯東即東國一人闕國字隱六年鄭人來渝平當依公穀作輸平成十五年晉侯執曹伯歸于京師當依公羊作歸之于京師定四年呉入郢當依公穀作呉入楚他非書法所闗者不録故嘗謂春秋一經左氏尤多闕誤八月庚申及齊師戰于乾時我師敗績魯師未有書敗績者誼不係於敗故因削而不書以示教若乾時之敗莊公本以伐齊納糾已為非誼及小白既入公乃遂不量力至與齊戰師徒崩喪而子糾不免於死為莊公者其罪為如何也誼係於敗故備書以重其惡十有九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟此一章主書本以效莊公失馭臣之柄書單伯逆王姬則父子之倫絶書夫人姜氏入則夫婦之恩乖書齊人取子糾殺之則交鄰之誼虧書築郿書新延廏書城諸防書築臺于郎于薛于秦則君民之道喪結諸公子也而任為大夫私媵于陳既不出于君命專盟于鄄又非有干國論是莊公失馭臣之柄矣故傳者以莊公為多失道冬齊人宋人陳人伐我西鄙春秋詳内事故凡書加兵於魯者必言某鄙其言者見於魯史者也其不言者魯史所不見而事具於彼國之史者也故哀八年呉伐我不言鄙十一年齊國書帥師伐我不言鄙事具於彼國之史則其不言者本所闕也二十有二年春王正月肆大眚眚公羊作省案禮記有大省讀音獮由是考之肆大省猶文十六年書毁泉臺昭十一年書大蒐于比蒲謂為過眚者非肆者屬事之辭二十有四年八月丁丑夫人姜氏入戊寅大夫宗婦覿用幣哀姜書入以孟任故也蓋孟任者既已許之為夫人且又割臂盟公生子般矣則哀姜胡為而至焉故入者逆辭也纂辭也有内主之辭也方其時莊公冒喪納幣二年之間三至齊廷又遇于穀盟于扈越禮不顧如此其急而齊人有疑如此其緩親逆而不與俱入既至而覿見有加聖人備書於經則不惟見夫人之伉而莊公不能正身率禮遂使嗣子受禍㡬至亡國其是非得失之迹設施於前而成敗吉凶之效驗於後此春秋所以為聳善抑惡之書見諸行事深切著明二十有五年冬公子友如陳聘禮圖使於朝君親命之宰書幣宰夫具齋人皆公選命皆廷授幣皆官具春秋之聘則異於是矣國政多專於大夫出使非由於君命故縣子荅繆公之問古者大夫束脩之問不出疆埸雖欲哭安得而哭之今之大夫交政中國雖欲勿哭安得而勿哭其時事可知也故春秋於外大夫來魯者皆書使書聘各從其傳致之辭於自魯出者或以聘行或不以聘行一書曰如而不與其私交正其本之意也或曰外大夫以君命來則書不以君命來則不書内大夫以君命出則不書不以君命出則書其説亦通二十有八年冬築郿臺囿曰築郿字上下疑有闕文案詩小序言秦襄公始命有田狩之事園囿之樂是周制非有天子之命凡田狩遊觀之事皆諸侯所不得為者矧莊公比年以來書日食者三大水者二大無麥禾者一告糴者一有蜚者一不雨者一而築郿新延廏城諸防築臺于郎于薛于秦城小穀不思所以畏天災恤民隱屢興工築為其所不當為宜乎春秋備書之以甚其惡三十有二年八月癸亥公薨于路寢元年季子來歸案左氏傳公及齊侯盟于落姑請復季友齊侯許之使召諸陳公次于郎以待之季子來歸嘉之也史記稱慶父殺子般季友奔陳二年慶父殺閔公季友自陳與閔公弟申如邾慶父奔莒於是季友奉子申入立依史記則季子來歸當在閔二年依左氏則季子元年來歸二年慶父殺閔公季子再以僖公適邾慶父奔莒復入立之二説不同然以今考之閔公雖立尚幼慶父夫人當國季友者子般之黨誰為復之假使來歸既不能消除禍亂臨難苟免何以稱賢以此推之史記為是但恐經文錯簡誤在此耳二年夏五月乙酉吉禘于莊公不稱宫廟而但言莊公者蓋禘祭之禮本以文王為所出之帝祀之於周公之廟而周公配之故稱宫廟則疑於莊公可以配文王不稱宫廟則見其獨祭莊公而但假用其禘之儀制耳言吉又言禘者一事而兩失禮也秋八月辛丑公薨春秋諸國統紀卷一
