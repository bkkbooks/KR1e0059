  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0059_WYG_002-1a, image: WYG0159/WYG0159-0890a.png}
body:
  text: 春秋諸國統紀卷二元齊履謙撰魯國第一下僖公文公宣公成公襄公昭公定公哀公元年十有二月丁巳夫人氏之喪至自齊夫人氏而不言姜者公不為之喪也既云請而葬之復曰不為之喪者蓋僖公於時外示居厚不絶之恩内乏忠孝惻怛之志而成風在國已稱為夫人其曰夫人氏之喪者見其皆哀姜之私黨不以為公家之所與六年夏公會齊侯宋公陳侯衞侯曹伯伐鄭圍新城秋楚人圍許諸侯遂救許冬公至自伐鄭凡一出而再有事有以前事致者有以後事致者蓋公或與後事或不與後事與後事則以後事致不與後事則但以前事致諸侯遂救許而仍以伐鄭致者公不與救許也八年秋七月禘于太廟用致夫人致者三月廟見以禮成婦之名季孫行父如宋致女即其事也夫人者聲姜也觀其名所以知其人聲姜之不氏者是不必知其人也以禘禮致夫人瀆莫甚於此者何為不必知其人夫人之見於經者凡六或為締禍或為不允或虧於晩節惟聲姜在春秋中獨為保其完吉者禘于太廟用致夫人其失禮在事而不在夫人故不必知其人是亦書法也十年春王正月公如齊經書諸侯來朝於魯者三十六書公之朝於他國者齊十四晉二十一楚二夫朝者邦國所以事天子之名也春秋之時以諸侯而廷見於諸侯是則失禮之大者春秋欲悉正之則無以紀實而傳信欲並從而書之則又不足垂訓以示後故聖人於是毎為之内辭凡我公之朝皆一書曰如所以起問者見是非其辭似迂而實盡其事似諱而實彰初非有私於魯也諸凡言内辭者誼皆倣此二十年春新作南門新作南門新作雉門及兩觀凡言作者皆志其僭然雉門兩觀則因災而作其僭在前南門則無所因而作其僭自此其僭在前而亦謂之作者習而不知以為非失而不能正以禮是亦創始而已言南門而不名其門非一門也二十有六年公子遂如楚乞師公以楚師伐齊取榖定四年蔡侯以吳子及楚人戰于柏舉不言乞師桓十四年宋人以齊人蔡人衞人陳人伐鄭不言乞師而於此獨言乞師者案左氏傳稱東門襄仲臧文仲如楚見子玉道之以伐齊宋摟荆蠻以殘中國故特書乞師以甚其惡二十有八年公子買戍衞不卒戍刺之買避晉故不卒戍而還魯畏楚故殺子叢以説然春秋殺大夫不言故此獨言故者罪僖公也盟于齊盟于薄盟于宋以師伐齊遣兵戍衞妄殺無罪之人其亦忝周公之裔矣故特書故以甚其惡三十有三年乙巳公薨于小寢二年丁丑作僖公主作僖公主志僭也諸侯之主一尺天子之主尺有二寸故左氏傳曰作主非禮也誼自可見春秋凡宫廟制作非僭不志三月乙巳及晉處父盟案左氏傳晉人以公不朝來討公如晉夏四月己巳晉人使陽處父盟公然適晉不言如反國不書至盟不稱公處父去氏是皆晉史闕文非魯春秋之所記或曰内辭也適人之國而與人之人臣盟失正莫甚焉八月丁卯大事于太廟躋僖公大事祫也禮羣廟之主皆升合食於太祖今魯不行此禮但躋僖公而祀之一説喪制未終新主未當祔祭故上書躋僖公下書公子遂如齊納幣其失禮並見四年夏逆婦姜於齊聲姜自為逆婦也宋蕩伯姬來逆婦杞伯姬來求婦逆婦姜於齊同為母為子逆然自外來者必明其為某國某人自内出者則省文可見故或書或不書書之以為罪不書以示訓五年三月辛亥葬我小君成風哀姜以罪誅死雖還其喪而葬之於誼不可以入宗廟故僖公縁此誼尊成風為夫人以妾亂嫡非所以正名分尊君父也至其後世宣母敬嬴襄母定姒昭母齊歸哀母弋氏皆援例以立失禮自成風始也春秋惟弋氏文獨異説者以為哀未逾年餘並同夫人書之不没其實而已六年閏月不告月猶朝于廟猶者欲已而不已之辭閏月不告月猶朝于廟志不誠也不郊猶三望僭不能遏也壬午猶繹萬入去籥大夫强也皆欲已不已之辭九年三月夫人姜氏至自齊凡夫人如往法皆不書至何為法皆不書至古者婦人無外事無所見乎春秋故法不書至也此獨書至者以為得禮則夫人書如者六書㑹者五書歸者一書孫者二未有得禮者以為不安於魯經書夫人姜氏如齊一如常辭則亦未見其不安者此葢錯簡本當在四年逆婦姜於齊之下而後世傳冩誤屬於此耳十有五年單伯至自齊大夫恒出不書至惟見執於大國則書故書單伯至自齊意如婼至自晉皆所以見仇好之情成事序之體十有六年夏五月公四不視朔謁上曰告臨下曰視閏不告月簡宗廟也四不視朔厭朝政也秋八月辛未夫人姜氏薨毁泉臺毁泉臺穀梁氏曰喪不貳事貳事緩喪也以文為多失道矣昭十一年大蒐於比蒲左氏亦曰君有大喪國不廢蒐有三年之喪而無一日之慼三傳正相發明十有八年春王二月丁丑公薨于臺下冬十月子卒春秋之法凡未即位之君皆稱子卒則皆名子般子野未葬而名者也王子猛既葬而名者也皆未即位之君也子卒不名闕文也元年三月遂以夫人婦姜至自齊夫人何為或稱婦或不稱婦有姑則稱婦無姑則不稱婦何為或書氏或不書氏娶於諸侯者書氏娶於大夫者不書氏故穆姜稱婦齊姜稱婦齊姜書氏穆姜不書氏五年秋九月齊髙固來逆子叔姬一説子叔姬即文十五年齊人來歸者至是髙固逆為己妻春秋不罪髙固之非禮而著叔姬之不正故書執書歸書逆書來書之重辭之複其中必有美惡焉者此類是也莊二十七年莒慶來逆叔姬不詳書其始末者葢欲因此以明彼也著其不正之甚者爾八年夏六月公子遂如齊至黄乃復辛巳有事于太廟仲遂卒于垂壬午猶繹萬入去籥公子遂而曰仲遂者世仲氏也大夫皆世也然其世有自其身者有不自其身者世自其身故卒曰季友曰仲遂曰叔􅆄不自其身故卒曰公子牙奔曰公子慶父十有五年初稅畝孟子曰耕者助而不稅助謂借力以耕其公田稅謂履畝而收其私穀又案經書初者凡二事初獻六羽及初稅畝皆志其變法之端為後世鍳故獻羽書初則禘嘗烝不必書矣稅畝書初則用田賦不必書矣十有八年冬十月壬戌公薨于路寢元年三月作丘甲傳稱晉作州兵鄭作丘賦經書魯作丘甲當是時去古日逺諸侯僭恣已極丘乘之法無復先王之制諸如此類皆假其名誼以為稱號耳其事則但為增立軍行傳曰為齊難作丘甲按魯舊有三軍今復増立丘甲是為四軍矣所以明年有四卿並將六年二月辛巳立武宫武公成公十一世祖禮記魯公之廟文世室也武公之廟武世室也雖然魯公之廟自始不毁武公之廟既毁復立又若桓宫僖宫自始不毁者也煬宫既毁復立者也魯之廟制備見於此又案二傳獨魯公稱世室十有六年公至自會上言伐鄭此言公至自會傳冩之誤十有七年九月辛丑用郊因事以享曰用與禘于太廟用致夫人誼同書稱肆類禮稱類造皆因事以享之謂夫僭莫重於郊故春秋書之特詳其書三卜不從者一四卜不從者二五卜不從者一乃免牲者二乃免牛者一乃不郊者二不郊者一改卜牛者四猶三望者三郊者二用郊者一曰改卜牛曰猶三望曰用郊葢魯人之心方將以是為勤而聖人從而書之用備見當時僭竊不能自己之意諸凡言僭祭者誼皆倣此十有八年己丑公薨于路寢十有一年春王正月作三軍古者元侯之國有軍作師以承天子諸侯之國無軍敎衞以聽元侯故丘甲曰作三軍曰作皆僭作也故書十有九年公至自伐齊凡兵事侵以侵致定六年公至自侵鄭八年公至自侵齊是也圍以圍致僖二十九年公至自圍許定十二年公至自圍成是也救以救致襄五年公至自救陳是也今上書同圍齊下言公至自伐齊是亦傳冩之誤二十有九年春王正月公在楚魯公嵗首去在他國者有之莊二十三年在齊文三年在晉十四年在晉成十一年在晉襄五年在晉十三年又在晉皆不書獨此及昭公在乾侯書者皆失國者也昭公遂死於外襄公非有榮成伯之言亦㡬於不得入是以唯此二公獨書所在夫諸侯無王故每嵗必書王以謹始季氏無君故正月必存君以示誼三十有一年夏六月辛巳公薨于楚宫八年秋蒐于紅春秋凡五書蒐昭十一年二十二年定十三年十四年皆言大蒐此傳亦言大蒐于紅自根牟至於商衞革車千乗而經無大字者闕文也大蒐者簡車徒也在他公不書惟書於昭定者當二公在位君不得有其國而奪於大夫大夫不得専其政而制於陪臣私邑内畔日虞干戈軍旅困弊名侈實違故屢假蒐田之禮以聲威於國人狩者意在從禽故書公以斥其惡蒐者本於耀武故言大以見其夸十有三年春叔弓帥師圍費圍費圍成圍鄆圍郈皆内邑也案左氏傳南蒯以費畔叔弓帥師圍費弗克敗焉而經不書畔者内辭也上卿為主帥舉大衆圍其城屹然若敵國而經不書畔者著家臣之强也二者相須其誼乃備十有五年二月癸酉有事于武宫籥入叔弓卒去樂卒事萬武舞籥文舞萬入去籥樂不盡去也去樂卒事則盡去矣古者大夫以君命出聞喪徐行而不反死而以尸將事又大夫有變當祭不以告書曰有事于武宫籥入叔弓卒去樂卒事見大夫之益强也三十有一年十有二月己未公薨于乾侯八年從祀先公盜竊寳玉大弓從猶陪從之從稱先公而不言宫廟者非一公也魯自昭公去國君不得朝正於廟而季氏主其祭及季氏更微受制於陪臣而陽虎攝其事然春秋不得而書也故於是因寳玉大弓而并及之寳謂龜青純玉謂璋判白大弓謂弓繡質皆國之分器而藏之宗廟子孫世守之者然不曰攝而曰從者使若公之在祭者然為内辭以重著其失也十有五年壬申公薨于髙寢十有二年春用田賦賦謂兵賦用田賦者計其私田以為兵也與稅畝之誼略同當是時井地既廢民田不均所謂稅畝田賦者殆類秦之實田云傳曰悉索敝賦夏五月甲辰孟子卒孟子何以不書薨不以夫人之禮卒葬之也既曰夫人矣何為不以夫人之禮卒葬之昔陳司敗問昭公知禮乎孔子曰知禮孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君娶於吳為同姓謂之吴孟子君而知禮孰不知禮夫以孟子為夫人昭公之失也不以夫人之禮卒葬之哀公之過也或書或不書書之以為罪不書以示訓春秋諸國統紀卷二
