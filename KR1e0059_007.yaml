front:
  text: 春秋諸國統紀後序延祐丁巳夏大兄司成君居間纂春秋統紀凡若干卷客有問者曰大經若春秋自胡氏傳行於世儒者拱默朱子嘗曰看春秋且當先從胡氏是來者不復有所作矣及觀統紀剖析淵微發露大中條貫參差指歸攸當其説卓然不蹈前人一句一誼昔云春秋寓王法於魯史又云春秋無褒貶又云治春秋當先治五霸之功罪至於大法大訓蓋未有若統紀之能斥言而指明者俾讀之者思過半矣僕應曰非然夫士之間居退處匪賴聖賢典訓朝夕殆無為也汗漫涉獵而不深潛心思則亦無得於己深潛心思矣苟不筆之於紙則亦不能有以驗夫日新之功此統紀所以作也為幼而學老而未衰者焉客又曰若然信其功多於前矣夫較瑚璉圭璋之制者無勤於陶鎔追琢凡為陶鎔追琢者先賢也其功盛矣大矣若統紀之作謂有功遺經則可謂功多前人則不可客謝而去因記其説於卷末是年秋九月日思恭頓首書
