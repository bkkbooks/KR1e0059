body:
  text: 春秋諸國統紀卷六元齊履謙撰杞國第十三杞姒姓國夏亡湯封夏後於杞周武王克殷求禹之後得東樓公於杞仍封其故國自東樓公五世至武公入春秋桓三年書侯莊二十七年書伯僖二十三年書子文十二年又書伯襄二十九年又書子昭六年又書伯遂終春秋又案公穀杞侯並作紀侯武公靖公惠公成公桓公孝公文公平公悼公僖公湣公僖二十三成十八冬十有一月杞子卒襄六十桓七春王三月壬午杞伯姑容卒襄二十三孝十七春王三月己巳杞伯丐卒昭六四文十春王正月杞伯益姑卒昭二十四平十八秋八月丁酉杞伯郁釐卒定四二悼十杞伯成卒于會哀八九僖十冬十有二月癸亥杞伯過卒滕國第十四滕姬姓國文王子錯始封十六世至滕侯入春秋滕侯宣公昭公文公成公悼公哀公頃公隱公隱七滕侯春三月滕侯卒僖十九五宣七十春王三月宋人執滕子嬰齊宣九十一昭四秋八月滕子卒成十六五文二十夏四月辛未滕子卒昭三十六成三春王正月丁未滕子原卒昭二十八悼二十五秋七月癸巳滕子寧卒哀四十四頃二秋八月甲寅滕子結卒哀十一隱七秋七月辛酉滕子虞母卒莒國第十五莒姒姓國顓帝之後陸終氏産六子一曰樊武王封其裔兹輿期於莒自兹輿期十世至莒子入春秋莒子兹丕公紀公渠丘公黎比公著丘公共公文十八紀八冬莒弒其君庶其成十四渠丘公春王正月莒子朱卒襄三十一黎比公冬十有一月莒人弒其君密州昭十四著丘公秋八月莒子去疾卒邾國第十六邾曹姓國顓帝之後陸終氏第五子晏安武王克商封其苗裔曹俠於邾為附庸十二世至邾子克入春秋邾克子瑣文公定公宣公悼公莊公隱公莊十六子克冬十有二月邾子克卒莊二十八子瑣十二夏四月丁未邾子瑣卒文十三九文四十夏五月邾子籧篨卒成十七定四十冬十有二月邾子貜且卒襄十七宣十八春二月庚子邾子牼卒昭元四悼十夏六月丁巳邾子華卒定三十四莊三春二月辛卯邾子穿卒許國第十七許薑姓國炎帝裔孫伯夷為堯四嶽武王封其苗裔文叔於許十一世至莊公入春秋莊公穆公僖公昭公靈公悼公許男斯元公僖四十二穆四夏許男新臣卒文五十四僖二冬十月甲申許男業卒宣十七昭三十春王正月庚子許男錫我卒襄二十六靈四十秋八月壬午許男寧卒于楚昭十九四悼二十夏五月戊辰許世子止弒其君買哀十三元夏許男成卒宿國第十八宿風姓國伏羲之後世次不可詳考隱八宿男夏六月辛亥宿男卒楚國第十九楚芊姓國重黎之後鬻熊曽孫熊繹始封於楚蠻以子男之田十七世至武王史記皆不著其爵號武王三十五年自立為武王武王卒子文王熊資立始入春秋書荆文王卒子熊囏立五年為弟熊惲弒而代立是為成王始書楚後二世莊王旅始書卒文王成王穆王莊王共王康王郟敖靈王平王昭王惠王僖元二成十秋楚人伐鄭案史記成王即位布德施惠結舊好於諸侯使人獻天子天子賜胙曰鎮爾南方夷越之亂無侵中國於是楚地千里然則楚自此始為列國與周室通矣而春秋所以改書楚者以此僖二十一成三十三秋宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂執宋公以伐宋子者男子之美稱君國之通號故在春秋自五等本爵之外有以氏配子者髙子季子是也有以采配子者蘇子劉子是也有以號配子者潞子戎蠻子是也有以國配子者楚子吳子是也何以謂之以國配子由中國進之也夫吳楚僭王久矣而春秋不道也其恆稱不過曰吳曰荆曰吳人楚人而已柏舉之勝蔡侯進之黃池之亢魯晉進之此吳之所以始稱子也盂之張五國進之厥貉之夸四國進之此楚之所以始稱子也然春秋吳至黃池而終楚則自厥貉以下歷莊共康郟靈平昭惠凡世更八王中國之霸益衰諸侯之進楚者日衆極之至於宋之盟合左師以弭兵為名而晉楚之從交相見申之會大合十有一國之師而宋向戌鄭子産皆獻禮焉善乎世之醫氏之談曰人之一身元氣與客邪相為盛衰非客邪自能盛衰也由元氣之盛衰以致之也斯言也其得春秋聖人所以子吳楚之意歟故吳楚一也彼以蠻荒之禮接之我則書之為蠻荒稱荆稱吳者是也彼以從諸侯之禮接之我則書之為從諸侯稱楚人吳人者是也彼以大國之禮接之我則書之為大國稱楚子吳子者是也我不以匹夫而擅進退諸侯亂名實也實録而已文元十六成四冬十月丁未楚世子商臣弒其君頵宣十八三莊二十楚子旅卒襄十三一共三十楚子審卒襄二十八康十五楚子招卒昭元四郟敖楚子麇卒昭十一靈十楚子虔誘蔡侯般殺之于申春秋有以諸侯殺諸侯者矣未若楚子虔之施不以恕有以諸侯見殺於諸侯者矣未若蔡侯般之討得其罪觀其名所以知其人故楚平之誘殺戎蠻與楚靈之誘殺蔡侯一也或名或不名或誼繫於人則名以知其人或誼不繫於人則不必名以知其人昭十三靈十二楚公子比自晉歸于楚弒其君虔于乾溪蔡侯廬歸于蔡陳侯吳歸于陳案左氏傳平王即位封陳蔡復遷邑隱太子之子廬歸于蔡悼太子之子吳歸于陳桓十一年突歸于鄭不言爵莊二十四年赤歸于曹不言爵而此獨言爵者自楚封之故異於突赤入國而後位定者昭二十六平十三楚子居卒哀六十七昭二楚子軫卒吳國第二十吳姬姓國周太王長子太伯與弟仲雍避季歷去之荆蠻自號句吳荆蠻歸之者千餘家為吳太伯太伯卒無子仲雍嗣立武王克商求其後得周章已為吳君别封其弟虞仲為虞虞在中國吳在蠻夷自太伯五世而得封十二世晉滅虞虞滅二世而吳始大至夀夢稱王始入春秋夀夢諸樊餘祭夷末王僚闔廬夫差襄十二十五夀夢二吳子乘卒襄二十五諸樊十三吳子遏伐楚門于巢卒襄二十九餘祭四閽弒吳子餘祭昭十五七夷末十吳子夷末卒昭二十七僚十二吳弒其君僚定十四九闔廬十吳子光卒諸小國第二十一祭州隨鄧凡毛北燕燕穀郜巴小邾郯麇越厲崇牟英介葛於餘丘隱元冬十有二月祭伯來桓八冬祭公來遂逆王后于紀莊二十三春祭叔來聘祭或稱伯或稱公或稱叔者蓋以本封絶滅世仕王朝食采畿內故其爵不同云桓七夏鄧侯吾離來朝書名未詳隱七冬天王使凡伯來聘戎伐凡伯于楚丘以歸凡今衛州共城縣是亦本封絶滅食采畿內者襄二十九秋九月齊髙止出奔北燕昭三冬北燕伯欵出奔齊昭六冬齊侯伐北燕昭十二春齊髙偃帥師納北燕伯于陽燕在於春秋有二此獨言北燕者見其僻逺亦以别姞姓燕桓七夏穀伯綏來朝書名未詳僖二十夏郜子來朝或言春秋有二郜來朝者為南郜郜鼎為北郜蓋為宋所滅云諸亡國第二十二滅國紀談遂下陽弦虞溫黃項梁邢夔江六庸舒蓼蕭舒庸鄫萊逼陽舒鳩賴州來巢徐沈頓胡取國戴舒須句根牟鄟邿遷國陽降國郕鄣入國向極滑鄀鄅僖二夏虞師晉師滅下陽下陽虢邑不曰號而曰下陽者所以别東虢僖五冬晉人執虞公左氏傳晉滅虢師還館于虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而修虞祀且歸其職貢於王此蓋釋虞之所以不言滅修虞祀若紀季後五廟之類僖十春王正月狄滅溫溫子奔衛左氏傳狄滅溫蘇子無信也蘇子叛王又不能於狄狄人伐之王不救故滅蘇子奔衛以溫子為蘇子未詳程氏曰蘇子國於溫僖二十六秋楚人滅夔以夔子歸夔子不名者其辭初不服強執以歸昭三十冬十有二月吳滅徐徐子章羽奔楚啖子曰徐子名者初已自服吳子吳子唁而送之非能自奔又案舊説毁其宗廟曰滅奪以歸已曰取徙入封內曰遷服為臣虜曰降得而不居曰入其實等為亡國但亡之事異所以異辭耳當是時也江南之國楚為大而弦黃夔江六庸舒蕭賴頓胡之屬介于其境既滅其國或執其君在春秋獨為強暴其餘若極項須句根牟鄟邿則魯滅之談遂郕鄣陽萊則齊滅之虢逼陽則晉滅之州來巢徐則吳滅之滑鄀則秦滅之邢則衛滅之沈則蔡滅之鄫向則莒滅之鄅則邾滅之舒則徐滅之溫則狄滅之視楚之暴雖若有間至於侵敗王略陵蔑小寡則其為亂一也惟紀侯之棄國不守虞公之貪以致亡梁之淫湎自取此三國者其庶乎惡有所分矣春秋諸國統紀卷六
