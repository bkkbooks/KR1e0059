body:
  text: 春秋諸國統紀卷五元齊履謙撰衞國第六衞姬姓國武王少弟康叔始封十二世至桓公完入春秋桓公宣公惠公懿公文公成公穆公定公獻公襄公靈公出公隱四六桓十戊申衞州吁弑其君完冬十有二月衞人立晉經書弑君二十四其弑而自代者不論至為弑君者所立因遂不討賊有雖討之而不以其罪若晉惠公夷吾成公黒臋悼公周齊景公杵臼悼公陽生宋莊公馮文公鮑鄭襄公堅陳成公午此數君即胡氏所謂幸於禍而忘其讎誘於利而忘其辱者亦非春秋所與獨衞晉者則異於是石碏得討賊之誼宣公無取國之嫌故特書衞人立晉於殺州吁之下見其不與晉惠齊景宋莊諸公同宋桓公御說亦討賊而後立然而不書者以其有殺子游之惡故亦不得與衞晉偕也或曰名宣公而書立惡之也此即納伋之妻而殺伋者桓十二宣十九丙戌衞侯晉卒莊六二惠十夏六月衞侯朔入于衞案左氏傳初衞宣公生伋屬之右公子生夀及朔屬夀於左公子宣姜與公子朔搆伋并及夀殺之二公子故怨惠公桓十六年左公子洩右公子職立公子黔牟惠公奔齊至是諸侯伐衞納衞侯放公子黔牟乃即位凡諸侯復國有奉焉稱復歸無奉焉但稱歸未有稱入者其稱入者皆二君之辭也鄭突以子儀衞衎以剽衞朔以黔牟皆以二君之辭言之然則孰與曰皆莫適與也不没其實而已其善其惡為法為戒則付諸後人是則春秋之敎也莊二十五惠三十一夏五月癸丑衞侯朔卒莊二十八懿三春王三月甲寅齊人伐衞衞人及齊人戰衞人敗績敗者稱師衞獨不稱師者師未敗也其書曰衞人敗績亦猶鄢陵之稱楚子云僖二十五文二十五夏四月癸酉衞侯燬卒宣九十五成三冬十月癸酉衞侯鄭卒成二一穆十庚寅衞侯遫卒成十四定十二冬十月庚寅衞侯臧卒襄二十五獻二十九衞侯入于夷儀案左氏傳衞孫林父寗殖出衞侯衎衞侯衎奔齊齊人以郲寄衞侯衞人立公孫剽孫林父寗殖相之以聽命於諸侯故經書十六年會湨梁十八年同圍齊二十年盟澶淵二十一年會商任二十二年會沙隨二十四年會夷儀二十五年會夷儀皆為公孫剽湨梁之會傳又言荀偃使諸大夫盟髙厚髙厚逃歸於是叔孫豹晉荀偃宋向戌衞寗殖鄭公孫蠆小邾之大夫盟是即孫寗相剽以會諸侯之證今又書衞侯入于夷儀是衞有二君矣聞之蘇氏曰春秋有一國而二君者鄭突與儀衞衎與剽是也突衎始終為君儀之君鄭十有四年剽之君衞十有一年皆既能君者也故春秋因其實而君之然突之入也以簒衎之出也以惡儀剽雖國人之所立而突衎在焉非所以為安也君子不幸而處於此如子臧季札可也不如是則亂不止此說是也又案鄭伯突入于櫟則書名此不書名者闕文也襄二十九獻三十三庚午衞侯衎卒昭七襄九秋八月戊辰衞侯惡卒哀二十二靈四夏四月丙子衞侯元卒蔡國第七蔡姬姓國文王子叔度始封叔度以罪放其子蔡仲俾繼其國十四世至宣侯考父入春秋宣公桓侯哀侯穆侯莊侯文公景公靈公平公悼侯昭侯隱八十五宣三夏六月己亥蔡侯考父卒桓十七桓二十夏六月丁丑蔡侯封人卒癸巳葬蔡桓侯公羊氏言卒從正葬從主人故春秋凡諸侯卒皆書其本爵而至葬則無不稱公書其本爵者春秋法也正也無不稱公者臣子辭也僭也然其僭多自東周始嘗考之史記晉自武公以上凡十四世皆稱侯至武公始稱公衞自武公以上凡再世稱侯六世稱伯至武公始稱公燕自莊公以上凡十六世皆稱侯至莊公始稱公曹自繆公以上凡八世皆稱伯至繆公始稱公惟魯齊宋陳杞鄭秦凡七國自始封遂稱公而蔡自始封訖于亡皆稱侯左氏傳蔡亦多稱侯若哀侯穆侯文侯景侯靈侯昭侯凡見於傳者皆是今經於封人亦書曰侯豈蔡在春秋獨為率由舊章者故其實録如此僖十四九穆二十冬蔡侯肸卒宣十七文二十丁未蔡侯申卒襄三十九景二十夏四月蔡世子般弑其君固昭十一靈十二夏四月丁巳楚子䖍誘蔡侯般殺之于申昭二十平八十有一月辛卯蔡侯廬卒昭二十三悼二夏六月蔡侯東國卒于楚哀四十八昭二春王二月庚戌盗殺蔡侯申陳國第八陳媯姓國舜之孫閼伯之子滿始封是為胡公十二世至桓公鮑入春秋桓公厲公莊公宣公穆公共公靈公成公哀公惠公懷公湣公桓五十八桓三春正月甲戌己丑陳侯鮑卒桓十二厲七八月壬辰陳侯躍卒莊元莊九冬十月乙亥陳侯林卒莊二十二宣二十一陳人殺其公子禦冦左氏傳作太子禦冦凡殺公子者公子為大夫則稱大夫冠於公子之上公子不為大夫則但稱公子公子側公子申公子壬夫公子嘉公子燮公子追舒公子過公子駟皆為大夫者公子瑕公子比公子禦冦公子意恢皆不為大夫者鄭三卿皆為大夫而不書大夫者從盗殺文誼可見也僖十二五宣四十冬十有二月丁丑陳侯杵臼卒僖二十八穆十六陳侯欵卒文十三共十八夏五月壬午陳侯朔卒宣十五靈十癸巳陳夏徴舒弑其君平國襄四十成二春王二月己酉陳侯午卒昭八十五哀三夏四月辛丑陳侯溺卒定四十八惠三春王二月癸巳陳侯吳卒定八懐四秋七月戊辰陳侯栁卒鄭國第九鄭姬姓國宣王母弟友始封三世至莊公寤生入春秋莊公厲公文公穆公靈公襄公悼公成公僖公簡公定公獻公聲公隱元十二莊二夏五月鄭伯克段于鄢伐始于京而勝于鄢不言伐京書其重者也不稱氏討賊辭也不言出奔書其重者也僅從而勝曰克隱六十七莊二鄭人來渝平渝當依公穀作輸彼欲而求成於我曰輸我欲而往平於彼曰暨兩相欲曰及鄭人以王師伐宋宋人使來告命公將救之使者失辭公怒乃止鄭人來輸平是彼欲而求成於我也楚子圍宋夏五月楚師將去申犀稽首於王之馬前曰無畏知死不敢廢王命王弃言焉王不能荅申叔時僕曰築室反耕者宋必聽命從之宋人懼使元以病告子反與之盟而告王退三十里宋及楚平是兩相欲也惟暨齊平左傳誤解作燕齊平今以下書叔孫婼如齊涖盟及宋公之弟辰之事證之是我欲而往平於彼也桓十一三莊四十夏五月癸未鄭伯寤生卒莊二十一厲二十八夏五月辛酉鄭伯突卒僖三十二文四十五夏四月己丑鄭伯捷卒宣三十二穆二冬十月丙戌鄭伯蘭卒宣四靈元夏六月乙酉鄭公子歸生弑其君夷成四八襄十三月壬申鄭伯堅卒成六悼二壬申鄭伯費卒襄二四成十六月庚辰鄭伯睔卒襄七僖五十有二月公會晉侯宋公陳侯衞侯曹伯莒子邾子于鄬鄭伯髠頑如會未見諸侯丙戌卒于鄵案左氏傳鄭僖公之為太子也與子罕適晉不禮焉又與子豐適楚亦不禮焉及將會于鄬子駟相又不禮焉侍者諫不聽又諌殺之及鄵子駟使賊夜弑僖公而以瘧疾赴于諸侯簡公嘉生五年奉而立之春秋書弑君有三誼有名其為賊者有不名其為賊者有實弑而書卒者其事則一從本史聖人不得而加損之故曰春秋之信史也信以傳信疑以傳疑又孔子嘗曰葢有不知而作之者我無是也昭十二六簡三十三月壬申鄭伯嘉卒昭二十八定十六夏四月丙戌鄭伯寧卒定九三獻十夏四月戊申鄭伯蠆卒曹國第十曹姬姓國文王子振鐸始封十二世至桓公終生入春秋桓公莊公僖公昭公共公文公宣公成公武公平公悼公聲公靖公哀公桓十十五桓五春王正月庚申曹伯終生卒莊二十三莊二十八冬十有一月曹伯射姑卒莊二十四僖元赤歸于曹史記僖公名夷今案經書曹羈出奔陳赤歸于曹赤葢僖公名謂之夷者史異聞僖七昭九曹伯班卒文九十五共三秋八月曹伯襄卒宣十四三文二十夏五月壬申曹伯夀卒成十三宣十七曹伯廬卒于師成十六成三曹伯歸自京師執君歸則名而曹伯不名執君歸則稱復而曹伯不稱復其曰曹伯歸自京師亦猶魯書公至自某葢歸之善者也或曰不以曹伯同失地之君者尊京師也亦通襄十八三成二十曹伯負芻卒于師昭十四七武二十春三月曹伯膝卒昭十八平四春王正月曹伯須卒昭二十悼二夏曹公孫會自鄸出奔宋自鄸出奔與華亥自南里宋辰自蕭何皆據邑以畔者然春秋自曹以下有本史者若杞滕薛莒邾許凡七國其世卿惟出奔見殺及好事接魯則名見於經若其餘會盟侵伐等事或從諸侯或本國専行不分世卿皆但書曰某人葢以其國小任輕其於時故不足以為盛衰故春秋不為之詳録云昭二十七悼九冬十月曹伯午卒定八靖四曹伯露卒秦國第十一秦嬴姓國伯翳十九世孫非子始封非子曽孫秦仲始命有禮樂侍御之好秦仲之孫襄公始列於諸侯九世至穆公任好始入春秋穆公康公共公桓公景公哀公惠公悼公文九康三秦人來歸僖公成風之襚成風之喪賵襚者多矣春秋皆削而不書而獨書周秦者僖公厚於其母生則以夫人之名號尊異之死則以夫人之禮秩卒葬之既請於王恩數有加而又赴告諸侯秦人逺至春秋别嫌疑明是非故王不書天於前秦則稱人於後其不曰秦伯使某來歸僖公成風之襚者若曰不出於其君之意云耳僅致其來之辭也見其為魯人求之文十八康十二秦伯罃卒宣四共四秦伯稻卒成十十八桓二秦伯卒昭五十景四秦伯卒定九十六哀三秋秦伯卒哀三惠九冬十月癸卯秦伯卒薛國第十二薛任姓國黄帝苗裔奚仲之後夏封奚仲為薛侯武王克商復以其胄紹故封春秋隱十一年稱侯莊三十一年稱伯遂終春秋薛伯獻公襄公薛比惠公莊三十一薛伯夏四月薛伯卒昭三十一獻夏四月丁巳薛伯穀卒定十二襄春薛伯定卒定十三伯比元薛弑其君比哀十二惠十夏五月薛伯夷卒春秋諸國統紀卷五
